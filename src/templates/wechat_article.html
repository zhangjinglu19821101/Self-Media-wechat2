<section style="padding:0 15px;max-width:750px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">

  <!-- 标题 -->
  <h2 style="font-size:20px;font-weight:bold;color:#1a1a1a;margin:25px 0 12px;line-height:1.5;text-align:center;">
    {{title}}
  </h2>

  <!-- 作者+日期 -->
  <p style="font-size:14px;color:#999;margin:0 0 20px;text-align:center;">
    {{author}} · {{date}}
  </p>

  <!-- 分隔线 -->
  <div style="height:1px;background:linear-gradient(to right,#eee,#ddd,#eee);margin:0 0 25px;"></div>

  <!-- 正文内容 - 使用抓取到的样式 -->
  <div style="font-size:16px;line-height:1.6;color:rgb(62,62,62);background-color:rgb(255,255,255);letter-spacing:0.578px;">
    {{content}}
  </div>

  <!-- 底部分隔 -->
  <div style="height:1px;background:linear-gradient(to right,#eee,#ddd,#eee);margin:30px 0 25px;"></div>

  <!-- 底部关注引导 -->
  <div style="font-size:14px;color:#666;line-height:1.6;text-align:center;padding:0 0 30px;letter-spacing:0.578px;">
    <p>你的储蓄规划是怎样的？欢迎将本文分享给正在做储蓄规划的朋友或家人，一起讨论如何根据各自不同的生活阶段，找到最合适的那把"财务钥匙"。</p>
    <p style="color:#ccc;margin-top:15px;">---</p>
    <p style="color:#999;margin-top:10px;font-size:12px;">点击关注，了解更多保险实用知识</p>
  </div>

</section>
